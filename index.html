<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJMIXHUB.com — Coming Soon</title>
  <meta name="description" content="DJMIXHUB.com is coming soon. A fresh home for mixes, DJs, and community energy." />
  <link rel="preload" href="assets/logo.jpg" as="image">
  <link rel="preload" href="assets/HOLD.mp3" as="audio">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-glow glow-1"></div>
  <div class="background-glow glow-2"></div>
  <div class="grid-overlay"></div>

  <main class="hero">
    <section class="card">
      <img src="assets/logo.jpg" alt="DJMIXHUB.com logo" class="logo" />

      <p class="eyebrow">PROJECT TEASER</p>
      <h1>Coming Soon</h1>
      <p class="lead">
        DJMIXHUB.com is getting ready to launch with a dark neon vibe, fresh mixes,
        and a community-first energy built for music lovers and DJs.
      </p>

      <div class="status-row">
        <span class="pill">Launching Soon</span>
        <span class="pill pill-outline">Stay Tuned</span>
      </div>

      <div class="equalizer" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <p class="small">
        A simple teaser page for the upcoming DJMIXHUB.com project.
      </p>

      <p id="audio-notice" class="small" style="display:none; margin-top:10px;">
        Tap anywhere to enable background audio.
      </p>
    </section>
  </main>

  <audio id="bg-audio" loop autoplay preload="auto">
    <source src="assets/HOLD.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const bgAudio = document.getElementById('bg-audio');
    const audioNotice = document.getElementById('audio-notice');

    bgAudio.volume = 0.35;

    function startAudio() {
      bgAudio.volume = 0.35;
      bgAudio.play().then(() => {
        audioNotice.style.display = 'none';
      }).catch(() => {});
    }

    startAudio();

    bgAudio.play().catch(() => {
      audioNotice.style.display = 'block';

      const unlockAudio = () => {
        startAudio();
        document.removeEventListener('click', unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
        document.removeEventListener('keydown', unlockAudio);
      };

      document.addEventListener('click', unlockAudio, { once: true });
      document.addEventListener('touchstart', unlockAudio, { once: true });
      document.addEventListener('keydown', unlockAudio, { once: true });
    });
  </script>
</body>
</html>
